<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,#141E30,#243B55,#000,#1f1c2c);
background-size:400% 400%;
animation:bg 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:380px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
text-align:center;
color:#fff;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

h1{
margin-top:20px;
font-size:32px;
}

p{
margin-top:15px;
color:#ddd;
line-height:28px;
}

.btn{
display:block;
margin-top:30px;
padding:18px;
background:#0088cc;
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
border-radius:50px;
transition:.3s;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
background:#0099ee;
}

.footer{
margin-top:20px;
font-size:14px;
color:#aaa;
}
</style>

</head>

<body>

<div class="card">

<img src="profile.jpg" alt="Profile">

<h1>SANIYA</h1>

<p>
📈 Daily Trading Community<br><br>
✅ Daily Updates<br>
✅ Educational Content<br>
✅ Fast Support
</p>

<a class="btn" href="#" onclick="joinTelegram(); return false;">
🚀 JOIN TELEGRAM
</a>

<div class="footer">
Powered by GitHub Pages
</div>

</div>

</body>
</html>
